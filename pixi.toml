[workspace]
name = "oamp"
version = "0.1.0"
description = "Open Source Astrodynamic Mission Planning"
authors = ["HortDog"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.11,<3.13"
numpy = "*"
scipy = "*"
fastapi = "*"
uvicorn = "*"
websockets = "*"
pydantic = ">=2"
casadi = "*"
httpx = "*"
pytest = "*"
ruff = "*"
hatchling = "*"

[pypi-dependencies]
oamp = { path = ".", editable = true }
spiceypy = "*"
msgpack = "*"

[tasks]
dev = "uvicorn oamp.api.main:app --reload --host 0.0.0.0 --port 8000 --app-dir backend"
test = "pytest -q backend/tests"
lint = "ruff check backend"
fmt = "ruff format backend"
arch = "d2 docs/architecture.d2 docs/architecture.svg"
kernels = "python -m oamp.spice.fetch_kernels"

# JAX is the chosen accelerator (Numba dropped — see README). No jaxlib
# conda-forge wheel on win-64, so install via pypi for portability. Swap to a
# CUDA jaxlib for Linux+NVIDIA setups.
[feature.gpu.pypi-dependencies]
jax = "*"
jaxlib = "*"

[feature.workers.pypi-dependencies]
ray = "*"

[environments]
default = { features = [] }
gpu     = { features = ["gpu"] }
full    = { features = ["gpu", "workers"] }
