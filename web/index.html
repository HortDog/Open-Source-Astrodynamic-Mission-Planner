<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAMP — Sandbox</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #07090d; color: #d6e2f0; font: 13px/1.4 system-ui, sans-serif; }
      #app { display: grid; grid-template-rows: auto 1fr auto; height: 100%; }
      header { padding: 8px 12px; border-bottom: 1px solid #1a2230; }
      canvas { display: block; width: 100%; height: 100%; }
      footer { padding: 6px 12px; border-top: 1px solid #1a2230; font-family: ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>OAMP <span id="version" style="opacity:.6"></span></header>
      <main><canvas id="scene"></canvas></main>
      <footer id="status">init…</footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
