<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAMP — Sandbox</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #020a02; color: #80ff60; font: 13px/1.4 system-ui, sans-serif; }
      #app { display: flex; flex-direction: column; height: 100vh; }
      main { flex: 1; position: relative; min-height: 0; }
      header { padding: 4px 8px; border-bottom: 1px solid #1a3a1a; display: flex; align-items: center; gap: 8px; }
      header h1 { margin: 0; font-size: 12px; font-weight: 600; }
      header .ver { opacity: .6; font-family: ui-monospace, monospace; font-size: 11px; }
      header .spacer { flex: 1; }
      header button {
        background: #061406; color: #80ff60; border: 1px solid #2a602a;
        padding: 3px 8px; border-radius: 3px; cursor: pointer; font: 11px inherit;
      }
      header button:hover { background: #0d280d; border-color: #40a040; }
      header button[aria-pressed="true"] { background: #1a4a1a; border-color: #60d060; }
      #banner { padding: 3px 8px; background: #3b1d10; color: #ffba94; border-bottom: 1px solid #5a2a18; display: none; }
      #banner.show { display: block; }
      canvas { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }
      footer { padding: 3px 8px; border-top: 1px solid #1a3a1a; font-family: ui-monospace, monospace; font-size: 11px;
               display: flex; align-items: center; gap: 8px; }
      #scrub { flex: 1; accent-color: #60d060; }
      #status { white-space: nowrap; min-width: 200px; }
      /* Maneuver editor sidebar — absolute overlay on the right of the canvas. */
      #editor {
        position: absolute; top: 8px; right: 8px; bottom: 8px; width: 320px;
        background: rgba(6, 20, 6, 0.92); border: 1px solid #2a602a; border-radius: 4px;
        padding: 8px; overflow-y: auto; font-size: 11px;
        display: none; flex-direction: column; gap: 6px;
      }
      #editor.show { display: flex; }
      #editor h2 { margin: 0 0 4px 0; font-size: 12px; color: #a0ffa0; }
      #editor .section { border-top: 1px solid #1a3a1a; padding-top: 6px; }
      #editor label { display: block; margin: 2px 0; }
      #editor input[type="number"] {
        width: 100%; background: #020a02; color: #80ff60; border: 1px solid #2a602a;
        padding: 2px 4px; font: 11px ui-monospace, monospace;
      }
      #editor .vec3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
      #editor .maneuver { background: #0a1a0a; padding: 4px; border-radius: 3px; }
      #editor button {
        background: #061406; color: #80ff60; border: 1px solid #2a602a;
        padding: 3px 8px; border-radius: 3px; cursor: pointer; font: 11px inherit;
      }
      #editor button:hover { background: #0d280d; border-color: #40a040; }
      #editor button.danger { border-color: #803030; color: #ff9080; }
      #editor button.primary { background: #1a4a1a; border-color: #60d060; }
      #editor .row { display: flex; gap: 4px; align-items: center; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>OAMP</h1>
        <span class="ver" id="version"></span>
        <span class="spacer"></span>
        <button id="btn-leo" aria-pressed="true">LEO orbit (i=51.6°)</button>
        <button id="btn-launch">Launch demo</button>
        <button id="btn-leo-j2">LEO + J2 drift</button>
        <button id="btn-hohmann">Hohmann LEO→GEO</button>
        <button id="btn-lambert">Lambert intercept</button>
        <button id="btn-cislunar">Cislunar TLI</button>
        <button id="btn-editor">Maneuver editor</button>
      </header>
      <div id="banner"></div>
      <main>
        <canvas id="scene"></canvas>
        <aside id="editor">
          <div class="row" style="margin-bottom:4px">
            <label style="flex:1">Central body
              <select id="ic-body" style="width:100%;background:#020a02;color:#80ff60;border:1px solid #2a602a;padding:2px 4px;font:11px ui-monospace, monospace">
                <option value="EARTH">Earth</option>
                <option value="MOON">Moon</option>
              </select>
            </label>
          </div>
          <h2>Initial state (BCI, m / m/s)</h2>
          <div class="vec3">
            <input id="ic-rx" type="number" step="1000" />
            <input id="ic-ry" type="number" step="1000" />
            <input id="ic-rz" type="number" step="1000" />
          </div>
          <div class="vec3">
            <input id="ic-vx" type="number" step="10" />
            <input id="ic-vy" type="number" step="10" />
            <input id="ic-vz" type="number" step="10" />
          </div>
          <div class="row">
            <label style="flex:1">Duration (s)
              <input id="ic-duration" type="number" step="60" />
            </label>
            <label>Steps
              <input id="ic-steps" type="number" step="50" min="2" max="20000" />
            </label>
            <label>Mass (kg)
              <input id="ic-mass" type="number" step="100" min="1" value="1000" />
            </label>
          </div>
          <div class="section">
            <h2>Perturbations</h2>
            <label class="row" style="gap:6px">
              <input id="pert-j2" type="checkbox" /> Zonal harmonics J2…
              <select id="pert-jn-max" style="background:#020a02;color:#80ff60;border:1px solid #2a602a;font:11px inherit">
                <option value="2">J2</option>
                <option value="3">J3</option>
                <option value="4">J4</option>
                <option value="5">J5</option>
                <option value="6">J6</option>
              </select>
            </label>
            <label class="row" style="margin-top:3px;gap:6px">
              <input id="pert-drag" type="checkbox" /> Atmospheric drag
              <select id="pert-drag-model" style="background:#020a02;color:#80ff60;border:1px solid #2a602a;font:11px inherit">
                <option value="exponential">exponential</option>
                <option value="msis">MSIS</option>
              </select>
            </label>
            <label style="margin-top:3px"><input id="pert-srp" type="checkbox" /> Solar radiation pressure</label>
            <label style="margin-top:3px"><input id="pert-3b-moon" type="checkbox" /> Third body: Moon</label>
            <label style="margin-top:3px"><input id="pert-3b-sun" type="checkbox" /> Third body: Sun</label>
            <div id="pert-vehicle" style="display:none; margin-top:4px">
              <div class="vec3">
                <label>mass (kg)<input id="pert-mass" type="number" value="500" step="10" min="1" /></label>
                <label>drag A (m²)<input id="pert-area" type="number" value="4" step="0.5" min="0.1" /></label>
                <label>Cd<input id="pert-cd" type="number" value="2.2" step="0.1" min="0" /></label>
              </div>
              <div class="vec3" style="margin-top:3px">
                <label>SRP A (m²)<input id="pert-srp-area" type="number" value="4" step="0.5" min="0.1" /></label>
                <label>Cr<input id="pert-srp-cr" type="number" value="1.5" step="0.1" min="0" max="2" /></label>
                <span></span>
              </div>
            </div>
            <div id="pert-active" style="margin-top:4px; font-family: ui-monospace, monospace; font-size: 10px; opacity:.75"></div>
          </div>
          <div class="section">
            <h2>Solvers</h2>
            <label>Type
              <select id="solver-type" style="width:100%;background:#020a02;color:#80ff60;border:1px solid #2a602a;padding:2px 4px;font:11px ui-monospace, monospace">
                <option value="hohmann">Hohmann coplanar transfer</option>
                <option value="lambert">Lambert intercept</option>
                <option value="multi-burn">Multi-burn NLP (CasADi)</option>
                <option value="tle">TLE ingest (SGP4)</option>
              </select>
            </label>
            <div id="solver-form" style="margin-top:4px"></div>
            <div class="row" style="margin-top:4px">
              <button id="btn-solve" class="primary" style="flex:1">Solve &amp; load into editor</button>
            </div>
            <div id="solver-info" style="margin-top:4px;font-family:ui-monospace,monospace;font-size:10px;opacity:.85"></div>
          </div>
          <div class="section">
            <h2>Maneuvers (RIC frame)</h2>
            <div id="man-list"></div>
            <button id="btn-add-man" style="margin-top: 6px">+ Add maneuver</button>
          </div>
          <div class="section row">
            <button id="btn-apply" class="primary">Propagate</button>
            <button id="btn-reset">Reset to LEO</button>
          </div>
          <div id="editor-summary" class="section" style="font-family: ui-monospace, monospace; font-size: 10px;"></div>
        </aside>
      </main>
      <footer>
        <span id="status">init…</span>
        <input id="scrub" type="range" min="0" max="0" value="0" step="1" />
        <span id="scrub-info"></span>
        <svg id="alt-chart" width="200" height="30" xmlns="http://www.w3.org/2000/svg"
             style="display:block;background:#020a02;border:1px solid #1a3a1a">
          <polyline id="alt-line" points="" fill="none" stroke="#80ff60" stroke-width="1" />
          <line id="alt-cursor" x1="0" y1="0" x2="0" y2="30" stroke="#ffba40" stroke-width="1" />
          <text id="alt-label" x="3" y="10" font-size="9" fill="#80ff60" font-family="ui-monospace,monospace"></text>
        </svg>
        <label style="display:flex;align-items:center;gap:3px">cam
          <select id="cam-target" style="background:#020a02;color:#80ff60;border:1px solid #2a602a;font:11px ui-monospace,monospace">
            <option value="origin">central body</option>
            <option value="craft">spacecraft</option>
            <option value="moon">moon</option>
          </select>
        </label>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
