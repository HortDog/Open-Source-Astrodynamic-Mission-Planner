<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAMP — Sandbox</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; min-height: 100%; background: #07090d; color: #d6e2f0; font: 13px/1.4 system-ui, sans-serif; }
      #app { display: grid; grid-template-rows: auto auto 1fr auto; min-height: 100vh; }
      main { min-height: 420px; position: relative; }
      header { padding: 8px 12px; border-bottom: 1px solid #1a2230; display: flex; align-items: center; gap: 12px; }
      header h1 { margin: 0; font-size: 14px; font-weight: 600; }
      header .ver { opacity: .6; font-family: ui-monospace, monospace; }
      header .spacer { flex: 1; }
      header button {
        background: #131b27; color: #d6e2f0; border: 1px solid #2a3445;
        padding: 4px 10px; border-radius: 4px; cursor: pointer; font: inherit;
      }
      header button:hover { background: #1a2536; border-color: #3a4a64; }
      header button[aria-pressed="true"] { background: #284060; border-color: #4878a0; }
      #banner { padding: 6px 12px; background: #3b1d10; color: #ffba94; border-bottom: 1px solid #5a2a18; display: none; }
      #banner.show { display: block; }
      canvas { display: block; width: 100%; height: 100%; }
      footer { padding: 6px 12px; border-top: 1px solid #1a2230; font-family: ui-monospace, monospace; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>OAMP</h1>
        <span class="ver" id="version"></span>
        <span class="spacer"></span>
        <button id="btn-leo" aria-pressed="true">LEO orbit (i=51.6°)</button>
        <button id="btn-launch">Launch demo</button>
        <button id="btn-leo-j2">LEO + J2 drift</button>
      </header>
      <div id="banner"></div>
      <main><canvas id="scene"></canvas></main>
      <footer id="status">init…</footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
